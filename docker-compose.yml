services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    image: php:8.2-apache
    depends_on:
      - db
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./www:/var/www/html
    # Install ekstensi mysqli otomatis agar PHP native bisa konek ke MySQL
    command: >
      sh -c "docker-php-ext-install mysqli pdo_mysql && apache2-foreground"

volumes:
  db_data: