<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPWIJA SmartLab - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-700 min-h-screen flex flex-col justify-between">

    <div>
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 sm:px-6 py-3">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 self-start md:self-center">
                    <img src="logo.png" alt="IPWIJA Logo" class="h-9 w-9 object-contain onerror-fallback">
                    <div>
                        <h1 class="font-bold text-slate-800 text-sm tracking-wide leading-tight">IPWIJA</h1>
                        <p class="text-[10px] text-slate-500 font-medium uppercase">SmartLab</p>
                    </div>
                </div>

                <div class="flex items-center gap-1 md:gap-4 overflow-x-auto w-full md:w-auto hide-scrollbar py-1 text-xs md:text-sm font-medium">
                    <a href="dashboard.html" class="whitespace-nowrap text-slate-600 hover:text-slate-900 px-3 py-1.5 rounded-md transition">Dashboard</a>
                    <a href="katalog_alat.html" class="whitespace-nowrap text-slate-600 hover:text-slate-900 px-3 py-1.5 rounded-md transition">Katalog Alat</a>
                    <a href="keranjang.html" class="whitespace-nowrap text-slate-600 hover:text-slate-900 px-3 py-1.5 rounded-md transition">Keranjang</a>
                    <a href="peminjaman.html" class="whitespace-nowrap text-slate-600 hover:text-slate-900 px-3 py-1.5 rounded-md transition">Peminjaman Saya</a>
                    <a href="profil.html" class="whitespace-nowrap bg-[#38BDF8] text-white px-3 py-1.5 rounded-md transition shadow-sm">Profil</a>
                </div>

                <div class="hidden md:flex relative">
                    <button onclick="toggleDropdown('userMenu')" class="flex items-center gap-2 hover:bg-slate-50 p-1.5 rounded-lg transition text-left">
                        <div class="w-8 h-8 rounded-full bg-[#E0F2FE] text-[#0369A1] font-bold flex items-center justify-center text-sm border border-[#BAE6FD]">A</div>
                        <div>
                            <p class="text-xs font-semibold text-slate-800 leading-3">Aprizal</p>
                            <span class="text-[10px] text-slate-400 font-medium tracking-tight">Mahasiswa</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 ml-1"></i>
                    </button>
                    <div id="userMenu" class="hidden absolute right-0 mt-12 w-48 bg-white border border-slate-200 rounded-xl shadow-lg py-1 z-50">
                        <button onclick="openModal()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium text-left">
                            <i class="fa-solid fa-arrow-right-from-bracket w-4"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-3xl mx-auto px-4 sm:px-6 py-6 md:py-10 space-y-6">
            <h2 class="text-xl font-bold text-slate-800">Profil Mahasiswa</h2>
            <div class="bg-white border border-slate-200 rounded-2xl p-5 flex flex-col sm:flex-row items-center gap-4 shadow-sm">
                <div class="w-16 h-16 rounded-full bg-[#E0F2FE] text-[#0369A1] font-bold flex items-center justify-center text-xl">A</div>
                <div class="text-center sm:text-left">
                    <h3 class="text-lg font-bold text-slate-800">Aprizal</h3>
                    <p class="text-xs text-slate-400">muhamadaprizal01@gmail.com</p>
                </div>
            </div>
        </main>
    </div>

    <footer class="text-center py-6 text-[10px] text-slate-400 border-t mt-10">&copy; 2026 IPWIJA SmartLab. All rights reserved.</footer>

    <div id="logoutModal" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl text-center space-y-5">
            <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center text-lg mx-auto"><i class="fa-solid fa-circle-exclamation"></i></div>
            <div class="space-y-1">
                <h4 class="font-bold text-slate-800 text-base uppercase">Yakin mau logout dek??</h4>
                <p class="text-xs text-slate-400">Sesi kamu bakal berakhir setelah ini.</p>
            </div>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="closeModal()" class="w-full border border-slate-200 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50">NO</button>
                <a href="index.html" class="w-full bg-rose-500 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-rose-600 flex items-center justify-center">YES</a>
            </div>
        </div>
    </div>

    <script>
        function toggleDropdown(id) { document.getElementById(id).classList.toggle('hidden'); }
        window.addEventListener('click', function(e) {
            const menu = document.getElementById('userMenu');
            if (menu && !menu.contains(e.target) && !menu.previousElementSibling.contains(e.target)) { menu.classList.add('hidden'); }
        });
        function openModal() { document.getElementById('logoutModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('logoutModal').classList.add('hidden'); }
    </script>
</body>
</html>
