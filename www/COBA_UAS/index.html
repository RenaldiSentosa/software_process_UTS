<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SmartLab IPWIJA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:1200px;
height:720px;
background:white;
display:flex;
overflow:hidden;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,.1);
}

/* LEFT */
.left{
width:50%;
background: linear-gradient(rgba(0,120,200,.30), rgba(0,120,200,.55)), url("./Rectangle 15.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
padding:35px;
display:flex;
flex-direction:column;
justify-content:space-between;
color:white;
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo-wrap{
width:70px;
height:70px;
border-radius:50%;
overflow:hidden;
background: rgba(255,255,255,.2);
padding:6px;
display:flex;
justify-content:center;
align-items:center;
backdrop-filter:blur(5px);
}

.logo-img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
background:white;
}

.logo-text h2{
font-size:24px;
}

.logo-text{
font-size:17px;
font-weight:600;
}

.content{
max-width:430px;
}

.content h1{
font-size:42px;
margin-bottom:15px;
}

.content p{
font-size:18px;
line-height:1.6;
}

.badges{
display:flex;
gap:15px;
margin-top:25px;
}

.badges span{
padding:10px 18px;
border-radius:30px;
background: rgba(255,255,255,.2);
font-size:14px;
}

.quote{
font-size:13px;
}

/* RIGHT */
.right{
width:50%;
padding:70px;
display:flex;
justify-content:center;
flex-direction:column;
}

.tabs{
width:180px;
display:flex;
background:#eee;
padding:5px;
border-radius:30px;
margin-bottom:30px;
}

.tabs button{
flex:1;
padding:10px;
border:none;
background:none;
cursor:pointer;
border-radius:30px;
font-weight: 500;
}

.active{
background:white;
box-shadow:0 5px 10px rgba(0,0,0,.1);
}

.progress{
display:flex;
gap:20px;
margin-bottom:30px;
}

.line{
height:10px;
flex:1;
background:#ddd;
border-radius:30px;
}

.fill{
background:#0089d6;
}

label{
font-weight:600;
display:block;
margin-bottom:10px;
}

.input{
height:55px;
border:1px solid #bbb;
border-radius:12px;
display:flex;
align-items:center;
padding:0 18px;
margin-bottom:20px;
}

.input input,
.input select{
width:100%;
border:none;
outline:none;
margin-left:10px;
font-size:15px;
background:none;
}

.btn{
width:100%;
height:55px;
border:none;
background:#0089d6;
color:white;
font-size:18px;
font-weight:600;
border-radius:10px;
cursor:pointer;
margin-top:10px;
transition: background 0.2s;
}

.btn:hover {
background: #0077bc;
}

.group{
display:flex;
gap:20px;
}

.group .btn{
width:50%;
}

.bottom{
text-align:center;
margin-top:20px;
}

.bottom a{
text-decoration:none;
color:#0089d6;
}

.hidden{
display:none;
}

@media(max-width:900px){
.container{
flex-direction:column;
height:auto;
}
.left,
.right{
width:100%;
}
.left{
height:420px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="left">
    <div class="logo">
        <div class="logo-wrap">
            <img src="./logo.png" class="logo-img">
        </div>
        <div class="logo-text">
            <h2>IPWIJA</h2>
            SMARTLAB
        </div>
    </div>

    <div class="content">
        <h1>Bergabung dengan SmartLab IPWIJA</h1>
        <p>Daftar sekarang untuk mengakses katalog alat laboratorium dan mengajukan peminjaman online.</p>
        <div class="badges">
            <span>500+ Alat Lab</span>
            <span>2.000+ Mahasiswa</span>
        </div>
    </div>

    <div class="quote">
        "Inovasi dimulai dari eksperimen"
    </div>
</div>

<div class="right">
    <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Daftar</button>
    </div>

    <div id="loginPage">
        <label>Email / NIM</label>
        <div class="input">
            <i class="fa-regular fa-envelope"></i>
            <input type="text" placeholder="Masukkan Email atau NIM">
        </div>

        <label>Password</label>
        <div class="input">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Masukkan Password">
        </div>

        <button class="btn" onclick="aksiLogin()">Login</button>

        <div class="bottom">
            Belum punya akun? <a href="#" onclick="openRegister()">Registrasi</a>
        </div>
    </div>

    <div id="reg1" class="hidden">
        <div class="progress">
            <div class="line fill"></div>
            <div class="line"></div>
        </div>

        <label>Nama Mahasiswa</label>
        <div class="input">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Nama Lengkap">
        </div>

        <label>NIM</label>
        <div class="input">
            <i class="fa-regular fa-id-card"></i>
            <input type="text" placeholder="202301110011">
        </div>

        <label>Email Aktif</label>
        <div class="input">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" placeholder="nama@gmail.com">
        </div>

        <button class="btn" onclick="nextStep()">Lanjut</button>
    </div>

    <div id="reg2" class="hidden">
        <div class="progress">
            <div class="line"></div>
            <div class="line fill"></div>
        </div>

        <label>Password</label>
        <div class="input">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Minimal 8 karakter">
        </div>

        <label>Konfirmasi Password</label>
        <div class="input">
            <i class="fa-solid fa-shield"></i>
            <input type="password" placeholder="Ulangi Password">
        </div>

        <label>Program Studi</label>
        <div class="input">
            <i class="fa-solid fa-graduation-cap"></i>
            <select>
                <option>Pilih Program Studi</option>
                <option>Informatika</option>
                <option>Rekayasa Perangkat Lunak (RPL)</option>
                <option>Sistem Informasi</option>
            </select>
        </div>

        <div class="group">
            <button class="btn" onclick="backStep()">Kembali</button>
            <button class="btn" onclick="aksiLogin()">Daftar</button>
        </div>
    </div>
</div>

</div>

<script>
const login = document.getElementById("loginPage");
const reg1 = document.getElementById("reg1");
const reg2 = document.getElementById("reg2");

const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");

// Fungsi Utama Redirect ke dashboard
function aksiLogin() {
    // Mau diisi inputan apapun bebas, langsung lempar ke dashboard.html
    window.location.href = "dashboard.html";
}

function openRegister(){
    login.classList.add("hidden");
    reg1.classList.remove("hidden");
    reg2.classList.add("hidden");
    
    // Switch active style tab ke Daftar
    loginTab.classList.remove("active");
    registerTab.classList.add("active");
}

function nextStep(){
    reg1.classList.add("hidden");
    reg2.classList.remove("hidden");
}

function backStep(){
    reg2.classList.add("hidden");
    reg1.classList.remove("hidden");
}

function backLogin(){
    login.classList.remove("hidden");
    reg1.classList.add("hidden");
    reg2.classList.add("hidden");
    
    // Switch active style tab ke Login
    loginTab.classList.add("active");
    registerTab.classList.remove("active");
}

registerTab.onclick = () => openRegister();
loginTab.onclick = () => backLogin();
</script>

</body>
</html>
